name: Test Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Run tests with coverage
      run: flutter test --coverage --test-randomize-ordering-seed random

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage/lcov.info
        flags: flutter
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Generate coverage report
      run: |
        flutter pub global activate coverage
        flutter pub global run coverage:format_coverage --lcov --in=coverage --out=coverage/lcov.info --report-on=lib

    - name: Upload coverage reports
      uses: actions/upload-artifact@v3
      with:
        name: coverage-report
        path: coverage/

  contract-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable

    - name: Install Soroban CLI
      run: cargo install --locked soroban-cli

    - name: Run Soroban contract tests
      working-directory: soroban_contracts/raffle_contract
      run: cargo test

  integration-test:
    runs-on: ubuntu-latest
    services:
      firestore:
        image: google/cloud-sdk:emulators
        ports:
          - 8080:8080
        env:
          FIRESTORE_PROJECT_ID: test-project
        options: >-
          --health-cmd "curl --fail http://localhost:8080"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Start Firestore emulator
      run: |
        gcloud emulators firestore start --host-port=localhost:8080 &
        sleep 5

    - name: Run integration tests
      run: flutter test test/integration_raffle_test.dart
      env:
        FIRESTORE_EMULATOR_HOST: localhost:8080

  security-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Run security tests
      run: flutter test test/security_raffle_test.dart

  performance-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Run performance tests
      run: flutter test test/performance_raffle_test.dart --timeout=10m

  error-handling-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'

    - name: Install dependencies
      run: flutter pub get

    - name: Run error handling tests
      run: flutter test test/error_handling_raffle_test.dart

  coverage-check:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v3

    - name: Download coverage reports
      uses: actions/download-artifact@v3
      with:
        name: coverage-report

    - name: Check coverage thresholds
      run: |
        # Install lcov if needed
        sudo apt-get update && sudo apt-get install -y lcov

        # Generate coverage report
        genhtml coverage/lcov.info --output-directory coverage/html

        # Check minimum coverage
        COVERAGE=$(lcov --summary coverage/lcov.info | grep "lines......:" | sed 's/.*lines......: \([0-9.]*\).*/\1/')

        if (( $(echo "$COVERAGE < 80.0" | bc -l) )); then
          echo "Coverage $COVERAGE% is below minimum threshold of 80%"
          exit 1
        else
          echo "Coverage $COVERAGE% meets minimum threshold"
        fi

    - name: Upload HTML coverage report
      uses: actions/upload-artifact@v3
      with:
        name: coverage-html-report
        path: coverage/html/